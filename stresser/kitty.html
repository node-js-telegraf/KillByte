<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KittyBox Dstat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[#3a414c] text-gray-100">
    <div class="container mx-auto p-4">
        <div class="mb-6 text-center">
            <h1 class="text-2xl font-semibold">KittyBox Graph With Love &lt;3</h1>
            <a href="http://50.7.24.50" class="text-sm text-gray-300 hover:text-red-400 transition duration-300">
                http://50.7.24.50
            </a>
        </div>

        <div class="bg-[#2b313a] shadow-lg rounded-lg p-4 md:p-6 mb-6">
            <canvas id="requestsChart" class="w-full" height="300"></canvas>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-[#2b313a] shadow-md rounded-lg p-4 flex flex-col items-center">
                <i class="fas fa-chart-line text-3xl mb-2 text-red-500"></i>
                <span class="text-2xl font-semibold" id="average-requests">0</span>
                <span class="text-sm text-gray-300">Average Requests</span>
            </div>

            <div class="bg-[#2b313a] shadow-md rounded-lg p-4 flex flex-col items-center">
                <i class="fas fa-chart-area text-3xl mb-2 text-red-500"></i>
                <span class="text-2xl font-semibold" id="peak-requests">0</span>
                <span class="text-sm text-gray-300">Peak Requests</span>
            </div>

            <div class="bg-[#2b313a] shadow-md rounded-lg p-4 flex flex-col items-center">
                <i class="fas fa-globe text-3xl mb-2 text-red-500"></i>
                <span class="text-2xl font-semibold" id="overall-requests">0</span>
                <span class="text-sm text-gray-300">Overall Requests</span>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('requestsChart').getContext('2d');
        const requestsChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Requests Per Second',
                    data: [],
                    backgroundColor: 'rgba(255, 0, 0, 0.2)',
                    borderColor: 'rgba(255, 50, 50, 0.9)',
                    pointBackgroundColor: '#ff3232',
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { color: '#ddd' }
                    },
                    x: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { color: '#ddd', autoSkip: true, maxTicksLimit: 10 }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#ddd' } }
                }
            }
        });

        let totalRequests = 0, peakRequests = 0, requestCount = 0, previousRequests = 0;

        const formatNumber = num => num >= 1e6 ? (num / 1e6).toFixed(1) + 'M' :
            num >= 1e3 ? (num / 1e3).toFixed(1) + 'K' : num;

        async function fetchData() {
            try {
                const res = await fetch('proxy.php', { headers: { 'Accept': 'text/plain' } });
                if (!res.ok) throw new Error('Fetch error');
                const text = await res.text();
                const lines = text.split('\n');
                if (lines.length < 3) return;

                const currentRequests = parseInt(lines[2].split(' ')[2]);
                if (isNaN(currentRequests)) return;

                const requestsPerSecond = (currentRequests - previousRequests) * 1000;
                previousRequests = currentRequests;

                const timeLabel = new Date().toLocaleTimeString();

                if (requestsChart.data.labels.length > 50) {
                    requestsChart.data.labels.shift();
                    requestsChart.data.datasets[0].data.shift();
                }

                requestsChart.data.labels.push(timeLabel);
                requestsChart.data.datasets[0].data.push(requestsPerSecond);
                requestsChart.update();

                totalRequests += requestsPerSecond;
                peakRequests = Math.max(peakRequests, requestsPerSecond);
                requestCount++;

                document.getElementById('average-requests').innerText = formatNumber((totalRequests / requestCount).toFixed(2));
                document.getElementById('peak-requests').innerText = formatNumber(peakRequests);
                document.getElementById('overall-requests').innerText = formatNumber(totalRequests);

            } catch (error) { console.error('Fetch error:', error); }
        }

        async function initFetch() {
            try {
                const res = await fetch('proxy.php', { headers: { 'Accept': 'text/plain' } });
                const text = await res.text();
                const lines = text.split('\n');
                previousRequests = parseInt(lines[2].split(' ')[2]) || 0;
            } catch (error) { console.error('Initial fetch error:', error); }
        }

        initFetch();
        setInterval(fetchData, 1000);
    </script>
</body>

</html>
